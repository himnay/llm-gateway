app:
  metadata:
    project-name: LLM Gateway
    description: Reactive Spring Boot gateway for OpenAI, Anthropic, Ollama, Google Gemini, Cohere and HuggingFace
    group-id: com.llm.gateway
    artifact-id: llm-gateway
    project-version: 0.0.1-SNAPSHOT
    spring-ai-version: 2.0.0-M8
    database: PostgreSQL 17

server:
  port: 8080

spring:
  application:
    name: llm-gateway
  main:
    web-application-type: reactive
  # Disable Spring Boot's Docker Compose auto-management; containers are started separately.
  docker:
    compose:
      enabled: false
  webflux:
    base-path: /llm
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 2s
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 2
  # R2DBC – reactive PostgreSQL used by ApiKeyService at runtime
  r2dbc:
    url: r2dbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:spring_ai}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    pool:
      initial-size: 1
      max-size: 10
      max-idle-time: 30m
      validation-query: SELECT 1
  # JDBC datasource used ONLY by Flyway at startup (not used by the app at runtime)
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:spring_ai}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
  flyway:
    enabled: true
    url: ${spring.datasource.url}
    user: ${spring.datasource.username}
    password: ${spring.datasource.password}
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    baseline-description: existing schema
  ai:
    # Disable Spring AI's own per-provider retry — the gateway's auto-failover
    # chain handles retries at a higher level. Keeping Spring AI retry enabled
    # causes each failing provider to block for 2s+4s+8s before we can move on.
    retry:
      max-attempts: 1
      on-http-codes: 429   # only retry on rate-limit; failover handles everything else
    openai:
      api-key: ${OPENAI_API_KEY:sk-placeholder}
      chat:
        model: gpt-4o
        temperature: 0.7
        max-tokens: 2048
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:placeholder}
      chat:
        model: claude-3-5-sonnet-20241022
        max-tokens: 2048
    ollama:
      base-url: ${OLLAMA_URL:http://localhost:11434}
      chat:
        model: llama3.1

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,loggers,env,circuitbreakers
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{traceId}/%X{spanId}] %-5level %logger{36} - %msg%n"
  level:
    root: INFO
    com.llm.gateway: DEBUG
    org.springframework.ai: INFO
    org.springframework.web: INFO
    io.github.resilience4j: INFO

gateway:
  auth:
    enabled: ${GATEWAY_AUTH_ENABLED:false}
    # Comma-separated list of valid raw API keys (only used when auth is enabled)
    # Keys are matched against SHA-256 hashes stored in the api_keys table.
    # Set GATEWAY_AUTH_ENABLED=true in production.
  cors:
    allowed-origins: ${GATEWAY_CORS_ORIGINS:http://localhost:3000,http://localhost:8080}
  rate-limiter:
    enabled: ${RATE_LIMITER_ENABLED:true}
    max-requests: ${RATE_LIMITER_MAX_REQUESTS:60}      # requests per window per client IP
    window-seconds: ${RATE_LIMITER_WINDOW_SECONDS:60}  # sliding window duration

resilience4j:
  circuitbreaker:
    instances:
      llm-gateway:
        slidingWindowSize: 10
        failureRateThreshold: 50  # Open circuit after 50% failure rate over last 10 calls
        waitDurationInOpenState: 30s          # Stay open 30s before allowing trial calls
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        recordExceptions:         # Treat these as failures for circuit-breaker purposes
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - org.springframework.web.reactive.function.client.WebClientResponseException
  retry:
    instances:
      llm-gateway:
        maxAttempts: 3
        waitDuration: 2s # Exponential backoff: 2s, 4s, 8s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
  ratelimiter:
    instances:
      llm-gateway:
        limitForPeriod: 60  # Allow 60 requests per minute per instance
        limitRefreshPeriod: 1m
        timeoutDuration: 500ms

llm:
  providers:
    openai:
      enabled: true
      api-key: ${OPENAI_API_KEY:sk-placeholder}
      api-url: https://api.openai.com/v1
      model: gpt-4o
    google:
      enabled: true
      api-key: ${GOOGLE_API_KEY:your-google-api-key-here}
      model: gemini-1.5-pro-latest
    anthropic:
      enabled: true
      api-key: ${ANTHROPIC_API_KEY:placeholder}
      api-url: https://api.anthropic.com/v1
      model: claude-3-5-sonnet-20241022
    ollama:
      enabled: true
      api-url: ${OLLAMA_URL:http://localhost:11434}
      model: llama3.1
    huggingface:
      enabled: true
      api-key: ${HUGGINGFACE_API_KEY:your-huggingface-api-key-here}
      api-url: https://api-inference.huggingface.co
      model: mistralai/Mistral-7B-Instruct-v0.1
    cohere:
      enabled: true
      api-key: ${COHERE_API_KEY:your-cohere-api-key-here}
      api-url: https://api.cohere.ai/v1
      model: command-r-plus
  cache:
    enabled: ${LLM_CACHE_ENABLED:true}
    ttl-minutes: ${LLM_CACHE_TTL_MINUTES:60}
    key-prefix: "llm:cache"
  chat:
    memory:
      ttl-hours: ${LLM_CHAT_MEMORY_TTL_HOURS:24}
  guardrails:
    pii-redaction:
      enabled: ${LLM_PII_REDACTION_ENABLED:true}
    toxicity:
      enabled: ${LLM_TOXICITY_FILTER_ENABLED:true}
    topic-filter:
      enabled: ${LLM_TOPIC_FILTER_ENABLED:true}
      blocked-topics: ${LLM_BLOCKED_TOPICS:}   # comma-separated list of restricted topics
    response-format:
      enabled: ${LLM_RESPONSE_FORMAT_ENABLED:true}
      min-length: ${LLM_RESPONSE_MIN_LENGTH:10}
      max-length: ${LLM_RESPONSE_MAX_LENGTH:50000}
  security:
    sanitization:
      enabled: ${LLM_SANITIZATION_ENABLED:true}
      max-prompt-length: ${LLM_MAX_PROMPT_LENGTH:10000}
      block-injection-patterns: ${LLM_BLOCK_INJECTION:true}
      block-on-violation: ${LLM_BLOCK_ON_VIOLATION:true}
  request:
    timeout-seconds: ${LLM_REQUEST_TIMEOUT_SECONDS:30}
  auto-failover:
    # When enabled, /query and /chat automatically try the next provider on auth/config errors.
    # The /failover endpoint always does explicit failover regardless of this setting.
    enabled: ${LLM_AUTO_FAILOVER_ENABLED:true}
    # Ordered list of providers tried when the primary provider fails.
    order: ${LLM_AUTO_FAILOVER_ORDER:openai,anthropic,google,cohere,huggingface,ollama}
    # Max seconds to wait per provider during failover before skipping to the next.
    # Keeps the overall chain fast even when one provider is slow or hanging.
    provider-timeout-seconds: ${LLM_AUTO_FAILOVER_PROVIDER_TIMEOUT:10}