app:
  metadata:
    project-name: LLM Gateway
    description: Reactive Spring Boot gateway for OpenAI, Anthropic, Ollama, Google Gemini, Cohere and HuggingFace
    group-id: com.llm.gateway
    artifact-id: llm-gateway
    project-version: 0.0.1-SNAPSHOT
    spring-ai-version: 2.0.0
    database: PostgreSQL 18

server:
  port: 8080
  shutdown: graceful

spring:
  application:
    name: llm-gateway
  main:
    web-application-type: reactive
  docker:            # Disable Spring Boot's Docker Compose auto-management; containers are started separately.
    compose:
      enabled: false
  webflux:
    base-path: /llm/v1
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:gatewayredis}
      database: 0
      timeout: 2s
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 2
  # R2DBC – reactive PostgreSQL used by RequestLogService (audit log) at runtime
  r2dbc:
    url: r2dbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:spring_ai}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    pool:
      initial-size: 1
      max-size: 10
      max-idle-time: 30m
      validation-query: SELECT 1
  # JDBC datasource used ONLY by Flyway at startup (not used by the app at runtime)
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:spring_ai}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
  flyway:
    enabled: true
    url: ${spring.datasource.url}
    user: ${spring.datasource.username}
    password: ${spring.datasource.password}
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    baseline-description: existing schema
    table: flyway_schema_history_gateway
  security:
    oauth2:
      resourceserver:
        jwt:
          # Spring Boot auto-configures a ReactiveJwtDecoder from this realm's discovery
          # document (issuer-uri + "/.well-known/openid-configuration"). Keycloak's
          # docker-compose service (port 8081) imports the "llm-gateway" realm on startup —
          # see docker/keycloak/llm-gateway-realm.json.
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8081/realms/llm-gateway}
  ai:
    # Disable Spring AI's own per-provider retry — the gateway's auto-failover
    # chain handles retries at a higher level. Keeping Spring AI retry enabled
    # causes each failing provider to block for 2s+4s+8s before we can move on.
    retry:
      max-attempts: 1
      on-http-codes: 429   # only retry on rate-limit; failover handles everything else
    openai:
      api-key: ${OPENAI_API_KEY:sk-placeholder}
      chat:
        model: gpt-4o
        temperature: 0.7
        max-tokens: 2048
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:placeholder}
      chat:
        model: claude-3-5-sonnet-20241022
        max-tokens: 2048
    ollama:
      base-url: ${OLLAMA_URL:http://localhost:11434}
      chat:
        model: llama3.1

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,loggers,env,circuitbreakers
  endpoint:
    health:
      show-details: when-authorized
      show-components: when-authorized
      roles: ACTUATOR
      probes:
        enabled: true
      group:
        # /actuator/health/readiness — ready to accept traffic (k8s readinessProbe)
        readiness:
          include: readinessState,redis,r2dbc,db
        # /actuator/health/liveness — process is alive (k8s livenessProbe)
        liveness:
          include: livenessState
    info:
      enabled: true
  info:
    git:
      mode: full
    build:
      enabled: true
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      # Publish Prometheus histogram buckets so Grafana can compute p50/p95/p99
      # latency — REST API turnaround time + per-provider LLM call latency.
      percentiles-histogram:
        http.server.requests: true
        llm.gateway.execution: true
        llm.request.latency.seconds: true
      slo:
        http.server.requests: 50ms,100ms,200ms,300ms,500ms,1s,2s,5s

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{traceId}/%X{spanId}] %-5level %logger{36} - %msg%n"
  level:
    root: INFO
    com.llm.gateway: DEBUG
    org.springframework.ai: INFO
    org.springframework.web: INFO
    io.github.resilience4j: INFO

gateway:
  auth:
    # SECURITY: auth is ENABLED by default — set GATEWAY_AUTH_ENABLED=false for local dev only.
    enabled: ${GATEWAY_AUTH_ENABLED:true}
  cors:
    allowed-origins: ${GATEWAY_CORS_ORIGINS:http://localhost:3000,http://localhost:8080}
  rate-limiter:
    enabled: ${RATE_LIMITER_ENABLED:true}
    max-requests: ${RATE_LIMITER_MAX_REQUESTS:60}      # requests per window per client IP
    window-seconds: ${RATE_LIMITER_WINDOW_SECONDS:60}  # sliding window duration
    # Comma-separated CIDRs/IPs trusted to supply X-Forwarded-For.
    # Only requests whose actual remote IP matches one of these will honour the header.
    # Leave empty to disable X-Forwarded-For trust (safest for direct-exposure deployments).
    trusted-proxies: ${GATEWAY_TRUSTED_PROXIES:127.0.0.1,::1}
  provider-rate-limits:
    limits:
      openai:
        requests-per-minute: 60
        tokens-per-minute: 90000
      anthropic:
        requests-per-minute: 40
        tokens-per-minute: 100000
      ollama:
        requests-per-minute: 120
        tokens-per-minute: 500000

springdoc:
  api-docs:
    path: /llm/v1/api-docs
  swagger-ui:
    path: /llm/v1/swagger-ui.html
    operationsSorter: alpha
    tagsSorter: alpha
    displayRequestDuration: true
  info:
    title: LLM Gateway API
    description: Reactive Spring Boot gateway for OpenAI, Anthropic, Ollama, Google Gemini, Cohere and HuggingFace
    version: 2.0.0

resilience4j:
  circuitbreaker:
    instances:
      llm-gateway:
        slidingWindowSize: 10
        failureRateThreshold: 50  # Open circuit after 50% failure rate over last 10 calls
        waitDurationInOpenState: 30s          # Stay open 30s before allowing trial calls
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        recordExceptions:         # Treat these as failures for circuit-breaker purposes
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - org.springframework.web.reactive.function.client.WebClientResponseException
      guardrails-service:         # Protects the LangChain guardrails sidecar call
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 20s
        permittedNumberOfCallsInHalfOpenState: 2
        automaticTransitionFromOpenToHalfOpenEnabled: true
        ignoreExceptions:         # Guardrail rejections are not service failures
          - com.llm.gateway.llm_gateway.security.PromptValidationException
  retry:
    instances:
      llm-gateway:
        maxAttempts: 3
        waitDuration: 2s # Exponential backoff: 2s, 4s, 8s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
  ratelimiter:
    instances:
      llm-gateway:
        limitForPeriod: 60  # Allow 60 requests per minute per instance
        limitRefreshPeriod: 1m
        timeoutDuration: 500ms

llm:
  providers:
    openai:
      enabled: true
      api-key: ${OPENAI_API_KEY:sk-placeholder}
      api-url: https://api.openai.com/v1
      model: gpt-4o
    google:
      enabled: true
      api-key: ${GOOGLE_API_KEY:your-google-api-key-here}
      model: gemini-1.5-pro-latest
    anthropic:
      enabled: true
      api-key: ${ANTHROPIC_API_KEY:placeholder}
      api-url: https://api.anthropic.com/v1
      model: claude-3-5-sonnet-20241022
    ollama:
      enabled: true
      api-url: ${OLLAMA_URL:http://localhost:11434}
      model: llama3.1
    huggingface:
      enabled: true
      api-key: ${HUGGINGFACE_API_KEY:your-huggingface-api-key-here}
      api-url: https://api-inference.huggingface.co
      model: mistralai/Mistral-7B-Instruct-v0.1
    cohere:
      enabled: true
      api-key: ${COHERE_API_KEY:your-cohere-api-key-here}
      api-url: https://api.cohere.ai/v1
      model: command-r-plus
  cache:
    enabled: ${LLM_CACHE_ENABLED:true}
    ttl-minutes: ${LLM_CACHE_TTL_MINUTES:60}
    key-prefix: "llm:cache"
  chat:
    memory:
      ttl-hours: ${LLM_CHAT_MEMORY_TTL_HOURS:24}
  guardrails:
    # ── External LangChain guardrails sidecar (docker-compose service: guardrails) ──
    # The gateway POSTs every prompt to {base-url}/guardrails/invoke (LangServe) BEFORE
    # calling any LLM provider (Chain of Responsibility step 300). Optionally the LLM's
    # answer is validated too (validate-output). Playground UI at {base-url}/guardrails/playground.
    # Protected by its own circuit breaker (resilience4j instance "guardrails-service").
    external:
      enabled: ${LLM_EXTERNAL_GUARDRAILS_ENABLED:true}
      base-url: ${LLM_EXTERNAL_GUARDRAILS_URL:http://localhost:8000}
      timeout-ms: ${LLM_EXTERNAL_GUARDRAILS_TIMEOUT_MS:3000}
      # fail-open=true  -> if the sidecar is down, requests continue (availability first)
      # fail-open=false -> if the sidecar is down, requests are rejected (safety first)
      fail-open: ${LLM_EXTERNAL_GUARDRAILS_FAIL_OPEN:false}
      validate-output: ${LLM_EXTERNAL_GUARDRAILS_VALIDATE_OUTPUT:false}
    pii-redaction:
      enabled: ${LLM_PII_REDACTION_ENABLED:true}
    toxicity:
      enabled: ${LLM_TOXICITY_FILTER_ENABLED:true}
    topic-filter:
      enabled: ${LLM_TOPIC_FILTER_ENABLED:true}
      blocked-topics: ${LLM_BLOCKED_TOPICS:}   # comma-separated list of restricted topics
    response-format:
      enabled: ${LLM_RESPONSE_FORMAT_ENABLED:true}
      min-length: ${LLM_RESPONSE_MIN_LENGTH:10}
      max-length: ${LLM_RESPONSE_MAX_LENGTH:50000}
    # ────────────────────────────────────────────────────────────────────────────
    # Externalised guardrail PATTERNS — bound to GuardrailPatternProperties.
    # These power the sensitive-data redactor, the prompt-injection sanitizer and the
    # toxicity filter. Add or remove entries here WITHOUT code changes. If a list/map
    # below is omitted, the built-in fail-safe defaults (in GuardrailPatternProperties)
    # apply; if you specify one, it REPLACES the default for that category.
    #
    # Uncomment and edit to customise. Use single quotes so regex backslashes are literal.
    #
    # patterns:
    #   sensitive-data:                 # type-name -> regex  (name becomes the [PLACEHOLDER])
    #     email: '[\w.%+\-]+@[\w.\-]+\.[A-Za-z]{2,}'
    #     api-key: '\b(?:sk|sk-ant|sk-proj|rk|pk)-[A-Za-z0-9_\-]{16,}\b'
    #     credit-card: '\b(?:4[0-9]{12}(?:[0-9]{3})?|5[1-5][0-9]{14})\b'
    #   injection:                      # hard-block regexes (match -> HTTP 400)
    #     - '(?i)\bignore\s+(?:all\s+)?previous\s+instructions?\b'
    #     - '(?i)\bjailbreak\b'
    #   strip:                          # removed but request continues
    #     - '(?is)<script[^>]*>.*?</script>'
    #   toxic-keywords:                 # lower-cased substrings
    #     - 'how to make a bomb'
    #     - 'create malware'
  security:
    sanitization:
      enabled: ${LLM_SANITIZATION_ENABLED:true}
      max-prompt-length: ${LLM_MAX_PROMPT_LENGTH:10000}
      block-injection-patterns: ${LLM_BLOCK_INJECTION:true}
      block-on-violation: ${LLM_BLOCK_ON_VIOLATION:true}
    # Provider-agnostic sensitive-data guard (PII + secrets). Applied in the gateway
    # facade for EVERY provider — including the custom REST providers that bypass the
    # Spring AI advisor chain — so nothing sensitive is sent to an LLM, cached, or logged.
    sensitive-data:
      enabled: ${LLM_SENSITIVE_DATA_ENABLED:true}
      redact-prompt: ${LLM_SENSITIVE_DATA_REDACT_PROMPT:true}     # redact before sending to provider
      redact-response: ${LLM_SENSITIVE_DATA_REDACT_RESPONSE:true} # redact before returning to caller
  request:
    timeout-seconds: ${LLM_REQUEST_TIMEOUT_SECONDS:30}
  stream:
    timeout-seconds: ${LLM_STREAM_TIMEOUT_SECONDS:120}
  auto-failover:
    # When enabled, /query and /chat automatically try the next provider on auth/config errors.
    # The /failover endpoint always does explicit failover regardless of this setting.
    enabled: ${LLM_AUTO_FAILOVER_ENABLED:true}
    # Ordered list of providers tried when the primary provider fails.
    order: ${LLM_AUTO_FAILOVER_ORDER:openai,anthropic,google,cohere,huggingface,ollama}
    # Max seconds to wait per provider during failover before skipping to the next.
    # Keeps the overall chain fast even when one provider is slow or hanging.
    provider-timeout-seconds: ${LLM_AUTO_FAILOVER_PROVIDER_TIMEOUT:10}