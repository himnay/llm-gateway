apiVersion: 1

# Auto-loads every dashboard JSON sitting next to this file
# (grafana-dashboard-llm-gateway.json), so it appears in Grafana automatically
# without a manual import. Grafana treats the .yml here as the provider config and
# the .json files as dashboards — keeping everything in one folder.
providers:
  - name: 'LLM Gateway'
    orgId: 1
    folder: 'LLM Gateway'
    folderUid: llm-gateway-folder
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
