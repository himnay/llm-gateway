services:
  guardrails: # LangChain-based guardrails REST service — the gateway validates every prompt here before calling any LLM
    build:
      context: ./guardrails-service
    image: llm-langchain:latest
    container_name: llm-langchain
    ports:
      - "8000:8000"
    environment:
      - GUARDRAILS_BLOCKED_TOPICS=${GUARDRAILS_BLOCKED_TOPICS:-}
      - GUARDRAILS_MAX_LENGTH=${GUARDRAILS_MAX_LENGTH:-10000}
      - GUARDRAILS_LLM_CHECK=${GUARDRAILS_LLM_CHECK:-false}   # optional LangChain LLM-as-judge
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}                    # only needed when GUARDRAILS_LLM_CHECK=true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
  postgres:
    image: postgres:18
    container_name: llm-postgres
    environment:
      POSTGRES_DB: spring_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d spring_ai"]
      interval: 10s
      timeout: 5s
      retries: 5
  pgadmin: # http://localhost:5050 — login: admin@llm-gateway.com / admin
    image: dpage/pgadmin4:latest
    container_name: llm-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@llm-gateway.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"            # desktop mode — no login page
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"  # no master password prompt
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
  redis:
    image: redis:latest
    container_name: llm-redis
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  redisinsight: # http://localhost:5540, add database -> host: redis -> username & password blank
    image: redis/redisinsight:latest
    container_name: llm-redisinsight
    ports:
      - "5540:5540"
    volumes:
      - redisinsight_data:/data
    depends_on:
      - redis
    restart: unless-stopped
  tempo:
    image: grafana/tempo:latest
    container_name: llm-tempo
    command: ["-config.file=/etc/tempo.yml"]
    restart: unless-stopped
    ports:
      - "3200:3200"   # Tempo HTTP API / Grafana query
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP  ← app sends traces here
    volumes:
      - ./observability/tempo.yml:/etc/tempo.yml:ro
      - tempo-data:/tmp/tempo
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3200/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
  loki:
    image: grafana/loki:latest
    container_name: llm-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
  prometheus:
    image: prom/prometheus:latest
    container_name: llm-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
  grafana:
    image: grafana/grafana:latest
    container_name: llm-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - tempo
      - loki

volumes:
  postgres_data:
  redis_data:
  redisinsight_data:
  pgadmin_data:
  grafana-data:
  tempo-data: