openapi: 3.0.3
info:
  title: llm-openrouter contracts
  description: >
    Component schemas only — used solely to generate the
    com.llm.gateway.openrouter.dto model classes via openapi-generator-maven-plugin.
    Not a full API description (no paths).
  version: "1.0.0"
paths: {}
components:
  schemas:
    OpenRouterRequest:
      type: object
      description: Request body for POST /chat.
      required:
        - prompt
      properties:
        prompt:
          type: string
          minLength: 1
          maxLength: 10000
          description: >
            'prompt' is required and must not be blank.
            NOTE: original Java validation used @NotBlank(message="'prompt' is required and
            must not be blank") and @Size(max=10000, message="'prompt' exceeds the maximum
            allowed length of 10,000 characters") — these custom messages are not representable
            in OpenAPI required/minLength/maxLength and will be lost; bean validation will fall
            back to default Jakarta messages unless re-added via @Schema or manual annotation.
        model:
          type: string
          description: >
            Overrides the configured default model, e.g. "anthropic/claude-3.5-sonnet".
        system_prompt:
          type: string
        correlation_id:
          type: string
          readOnly: true
          description: >
            Correlation ID propagated from the X-Request-ID header. Set by the handler; not
            expected from the client body.

    OpenRouterResponse:
      type: object
      description: Response body for POST /chat.
      properties:
        content:
          type: string
        model:
          type: string
        provider:
          type: string
        error:
          type: string
        prompt_tokens:
          type: integer
          format: int32
        completion_tokens:
          type: integer
          format: int32
        total_tokens:
          type: integer
          format: int32
        latency_ms:
          type: integer
          format: int64
        correlation_id:
          type: string
        timestamp:
          type: integer
          format: int64
