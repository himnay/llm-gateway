name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
      - name: Check code formatting (Spotless)
        run: mvn spotless:check
      - name: Build and test
        run: mvn clean verify -DskipITs
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: target/site/jacoco/jacoco.xml

  dependency-check:
    runs-on: ubuntu-latest
    # Needs network access to the NVD feed (and ideally an NVD_API_KEY secret) —
    # non-blocking so an unconfigured/rate-limited scan never fails the pipeline.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
      - name: OWASP dependency-check
        run: mvn -P security-scan verify -DskipTests
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
      - name: Upload dependency-check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: target/dependency-check-report.html

  docker-build:
    runs-on: ubuntu-latest
    needs: build
    # The build stage needs the maven_settings secret to resolve the private
    # super-pom/learning-bom parent — non-blocking until that secret exists in this repo.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: llm-gateway:ci
          secrets: |
            maven_settings=${{ secrets.MAVEN_SETTINGS }}
